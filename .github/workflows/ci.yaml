name: CI-CD Docker Pipeline

on:
  push:
    branches:
      - main
      - trivy

env:
  IMAGE_NAME: ci-html
  IMAGE_TAG: 1.0.1
  DOCKER_REGISTRY: ${{ secrets.DOCKERHUB_USERNAME }}

jobs:

  # ===============================
  # JOB 1 - CI : BUILD + PUSH
  # ===============================
  ci:
    runs-on: self-hosted
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Display variables
        shell: powershell
        run: |
          echo "IMAGE_NAME: $env:IMAGE_NAME"
          echo "IMAGE_TAG: $env:IMAGE_TAG"
          echo "DOCKER_REGISTRY: $env:DOCKER_REGISTRY"

      - name: Login to Docker Hub
        shell: powershell
        run: |
          docker login -u "$env:DOCKERHUB_USERNAME" -p "${{ secrets.DOCKERHUB_TOKEN }}"
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}

      - name: Build Docker image
        shell: powershell
        run: |
          docker build -t "$env:DOCKER_REGISTRY/$env:IMAGE_NAME`:$env:IMAGE_TAG" .

      - name: Verify image
        shell: powershell
        run: |
          docker image ls | Select-String $env:IMAGE_NAME

      - name: Push Docker image
        shell: powershell
        run: |
          docker push "$env:DOCKER_REGISTRY/$env:IMAGE_NAME`:$env:IMAGE_TAG"

  # ===============================
  # JOB 2 - SCAN TRIVY
  # ===============================
  scan-trivy:
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKERHUB_USERNAME }}/ci-html:1.0.1
          format: table
          exit-code: '0'
          ignore-unfixed: true
          severity: CRITICAL,HIGH

  # ===============================
  # JOB 3 - CD : DEPLOY
  # ===============================
  deploy:
    needs: scan-trivy
    runs-on: self-hosted
    steps:
      - name: Pull latest image
        shell: powershell
        run: |
          docker pull "$env:DOCKER_REGISTRY/$env:IMAGE_NAME`:$env:IMAGE_TAG"

      - name: Stop existing container
        shell: powershell
        run: |
          docker stop ci-app; $LASTEXITCODE = 0

      - name: Remove old container
        shell: powershell
        run: |
          docker rm ci-app; $LASTEXITCODE = 0

      - name: Run new container
        shell: powershell
        run: |
          docker run -d `
            -p 80:80 `
            --name ci-app `
            "$env:DOCKER_REGISTRY/$env:IMAGE_NAME`:$env:IMAGE_TAG"
