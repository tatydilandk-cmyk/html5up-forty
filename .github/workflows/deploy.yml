name: Deploy Static Site

on:
  push:
    branches:
      - main  # Le pipeline se déclenche uniquement sur les pushs vers main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'  # Indique que les fichiers à déployer sont à la racine

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
